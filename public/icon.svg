<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Agón">
  <defs>
    <linearGradient id="agon-flame" x1="12" y1="8" x2="52" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e0a85e"/>
      <stop offset="0.4" stop-color="#cf6a3c"/>
      <stop offset="1" stop-color="#43b5a6"/>
    </linearGradient>
    <radialGradient id="agon-bg" cx="0.32" cy="0.26" r="0.95">
      <stop offset="0" stop-color="#0f1c20"/>
      <stop offset="0.55" stop-color="#0b1417"/>
      <stop offset="1" stop-color="#091012"/>
    </radialGradient>
    <radialGradient id="agon-core" cx="0.5" cy="0.42" r="0.6">
      <stop offset="0" stop-color="#f0c887"/>
      <stop offset="1" stop-color="#e0a85e"/>
    </radialGradient>
  </defs>

  <!-- Background: dark cosmos rounded square -->
  <rect x="2" y="2" width="60" height="60" rx="15" fill="url(#agon-bg)"/>
  <rect x="2.5" y="2.5" width="59" height="59" rx="14.5" fill="none" stroke="#43b5a6" stroke-opacity="0.22" stroke-width="1"/>

  <!-- Two opposing laurel arcs (agon = contest/struggle symbol) -->
  <!-- Left arc: gold, champion side -->
  <path d="M18 44 C10 36, 10 28, 18 20" fill="none" stroke="#e0a85e" stroke-width="3" stroke-linecap="round"/>
  <path d="M21 42 C14 35, 14 29, 21 22" fill="none" stroke="#e0a85e" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.5"/>

  <!-- Right arc: teal, challenger side -->
  <path d="M46 20 C54 28, 54 36, 46 44" fill="none" stroke="#43b5a6" stroke-width="3" stroke-linecap="round"/>
  <path d="M43 22 C50 29, 50 35, 43 42" fill="none" stroke="#43b5a6" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.5"/>

  <!-- Central vertical line: the contest axis -->
  <line x1="32" y1="14" x2="32" y2="50" stroke="url(#agon-flame)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Top star/node: the prize -->
  <circle cx="32" cy="13" r="3.5" fill="url(#agon-core)"/>

  <!-- Bottom anchor -->
  <circle cx="32" cy="51" r="2.5" fill="#43b5a6"/>

  <!-- Center crossing point -->
  <circle cx="32" cy="32" r="2.8" fill="url(#agon-core)"/>
  <circle cx="32" cy="32" r="5.5" fill="none" stroke="#f0c887" stroke-opacity="0.25" stroke-width="1"/>
</svg>
